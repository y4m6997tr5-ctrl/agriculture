<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>すいすい農園</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>すいすい農園</h1>

    <div class="card">

      <h2 id="farm-name">トマト畑</h2>

      <div id="character">
        🥬
      </div>

      <p id="status">
        とても元気！
      </p>

      <div class="gauge-area">
        <div class="gauge">
          <div id="gauge-fill"></div>
        </div>

        <p id="humidity-text">
          70%
        </p>
      </div>

      <button id="water-button">
        水をあげる
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
